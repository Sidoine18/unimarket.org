<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    // 1. Config Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
        authDomain: "unimarket-d6259.firebaseapp.com",
        projectId: "unimarket-d6259",
        storageBucket: "unimarket-d6259.firebasestorage.app",
        messagingSenderId: "236655322274",
        appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb",
        measurementId: "G-2TL2FGK6SL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Récupérer la session locale
    let currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser) window.location.href = 'login.html';

    async function initDashboard() {
        // Mettre à jour les infos basiques
        document.getElementById('user-name').innerText = currentUser.fullname;
        document.getElementById('user-phone').innerText = "WA: " + (currentUser.whatsapp || "Non défini");

        try {
            // 2. Charger la photo de profil depuis Firestore (pour être à jour)
            const userRef = doc(db, "users", currentUser.email);
            const userSnap = await getDoc(userRef);
            
            if (userSnap.exists() && userSnap.data().profilePic) {
                const img = document.getElementById('profileImg');
                img.src = userSnap.data().profilePic;
                img.style.display = 'block';
                document.getElementById('defaultIcon').style.display = 'none';
            }

            // 3. Charger les annonces de cet utilisateur uniquement
            const q = query(collection(db, "ads"), where("emailVendeur", "==", currentUser.email));
            const querySnapshot = await getDocs(q);
            
            let myAds = [];
            let totalValue = 0;

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                myAds.push({ id: doc.id, ...data });
                totalValue += parseInt(data.price || 0);
            });

            // Mettre à jour les compteurs
            document.getElementById('count-ads').innerText = myAds.length;
            document.getElementById('total-value').innerText = totalValue.toLocaleString() + " F";

            renderMyAds(myAds);

        } catch (error) {
            console.error("Erreur Dashboard:", error);
        }
    }

    // --- Gestion de la photo de profil ---
    document.getElementById('avatarInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = async (event) => {
            const base64Image = event.target.result;
            
            // Preview immédiate
            const img = document.getElementById('profileImg');
            img.src = base64Image;
            img.style.display = 'block';
            document.getElementById('defaultIcon').style.display = 'none';

            // Sauvegarde Cloud
            try {
                const userRef = doc(db, "users", currentUser.email);
                await updateDoc(userRef, { profilePic: base64Image });
                
                // Update local storage aussi
                currentUser.profilePic = base64Image;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
            } catch (err) {
                alert("Erreur lors de la mise à jour de la photo.");
            }
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // --- Affichage des annonces ---
    function renderMyAds(ads) {
        const list = document.getElementById('my-ads-list');
        list.innerHTML = ads.length ? '' : '<p style="text-align:center; padding:30px; color:gray;">Aucune annonce en ligne.</p>';
        
        ads.forEach(ad => {
            const card = document.createElement('div');
            card.className = 'my-ad-card';
            card.innerHTML = `
                <img src="${ad.image}" class="my-ad-img">
                <div class="my-ad-info">
                    <h3>${ad.title}</h3>
                    <p style="color:var(--primary); font-weight:800;">${parseInt(ad.price).toLocaleString()} F</p>
                </div>
                <button class="btn-delete" data-id="${ad.id}"><i class="fa-solid fa-trash"></i></button>
            `;
            
            card.querySelector('.btn-delete').onclick = () => deleteAd(ad.id);
            list.appendChild(card);
        });
    }

    // --- Suppression Cloud ---
    async function deleteAd(id) {
        if (confirm("Supprimer définitivement cette annonce ?")) {
            try {
                await deleteDoc(doc(db, "ads", id));
                window.location.reload(); // Rafraîchir pour voir les changements
            } catch (error) {
                alert("Erreur lors de la suppression.");
            }
        }
    }

    // --- Logout ---
    window.logout = () => {
        if (confirm("Se déconnecter ?")) {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    };

    document.addEventListener('DOMContentLoaded', initDashboard);
</script>
