<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | UniMarket</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --white: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; display: block; text-decoration: none; }
        .logo span { color: var(--text); }
        
        h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 30px; color: var(--text); }

        .form-group { text-align: left; margin-bottom: 20px; position: relative; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: var(--text); }
        .form-group i { position: absolute; left: 15px; top: 38px; color: var(--muted); }
        
        .form-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn-login {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 15px rgba(37, 99, 235, 0.2); }

        .footer-text { margin-top: 25px; font-size: 0.9rem; color: var(--muted); }
        .footer-text a { color: var(--primary); font-weight: 700; text-decoration: none; }

        .loader { display: none; margin-right: 10px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="index.html" class="logo">Uni<span>Market</span></a>
        <h2>Heureux de vous revoir !</h2>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Universitaire</label>
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="etudiant@uac.bj" required>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fa-solid fa-circle-notch loader" id="loader"></i>
                Se connecter
            </button>
            
            <div style="margin-top: 15px;">
                <a href="forgot.html" style="font-size: 0.8rem; color: #2563eb; text-decoration: none;">Mot de passe oublié ?</a>
            </div>
        </form>

        <p class="footer-text">
            Nouveau ici ? <a href="register.html">Créer un compte</a>
        </p>
    </div>

    <script>
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');

    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const emailSaisi = document.getElementById('email').value.trim();
        const passSaisi = document.getElementById('password').value;

        // 1. On récupère tous les inscrits
        const users = JSON.parse(localStorage.getItem('unimarket_users')) || [];

        // 2. On cherche l'utilisateur qui a cet email ET ce mot de passe
        const userFound = users.find(u => u.email === emailSaisi && u.password === passSaisi);

        if (userFound) {
            // SUCCESS : On change l'apparence du bouton
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Connexion...';
            
            // 3. LOGIQUE CORRECTE : On ajoute l'état connecté AVANT d'enregistrer
            const userToLog = { 
                ...userFound, 
                isLoggedIn: true,
                isVerified: true 
            }; 

            // 4. On enregistre la session
            localStorage.setItem('unimarket_session', JSON.stringify(userToLog));
            
            // 5. Redirection après un petit délai pour l'effet visuel
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1200);

        } else {
            // ERREUR : Identifiants inconnus
            alert("Erreur : Email ou mot de passe incorrect !");
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Se connecter';
        }
    });
    </script>

</body>
</html>
