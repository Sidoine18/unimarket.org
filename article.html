<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    // 1. Ta config Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
        authDomain: "unimarket-d6259.firebaseapp.com",
        projectId: "unimarket-d6259",
        storageBucket: "unimarket-d6259.firebasestorage.app",
        messagingSenderId: "236655322274",
        appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb",
        measurementId: "G-2TL2FGK6SL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Variables globales pour cette page
    let currentAd = null;
    const params = new URLSearchParams(window.location.search);
    const adId = params.get('id');
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));

    // 2. Charger l'article depuis Firestore
    async function chargerArticle() {
        if (!adId) {
            window.location.href = 'index.html';
            return;
        }

        try {
            const adRef = doc(db, "ads", adId); // On cherche dans la collection "ads"
            const adSnap = await getDoc(adRef);

            if (!adSnap.exists()) {
                document.body.innerHTML = "<div style='text-align:center; padding:50px;'><h2>Annonce expirée ou introuvable.</h2><br><a href='index.html'>Retour à l'accueil</a></div>";
                return;
            }

            currentAd = { id: adSnap.id, ...adSnap.data() };

            // Remplissage de l'interface
            document.getElementById('art-img').src = currentAd.image;
            document.getElementById('art-title').innerText = currentAd.title;
            document.getElementById('art-price').innerText = parseInt(currentAd.price).toLocaleString() + " F";
            document.getElementById('art-cat').innerText = currentAd.category;
            document.getElementById('art-uni').innerText = currentAd.university || "Campus";
            document.getElementById('art-desc').innerText = currentAd.desc;
            document.getElementById('seller-name').innerText = currentAd.vendeur;
            document.getElementById('seller-init').innerText = currentAd.vendeur.charAt(0).toUpperCase();
            document.getElementById('wa-link').href = currentAd.whatsapp;
            
            if (currentAd.isBoosted) document.getElementById('boost-tag').style.display = 'block';

            // Vérifier si l'article est déjà en favori
            checkIfFav();

        } catch (error) {
            console.error("Erreur de chargement:", error);
        }
    }

    // 3. Logique des Favoris (Cloud)
    async function toggleFavoris() {
        if (!currentUser) {
            alert("Connectez-vous pour ajouter des favoris !");
            window.location.href = 'login.html';
            return;
        }

        const userRef = doc(db, "users", currentUser.email);
        const btn = document.getElementById('fav-btn');
        const isCurrentlyFav = btn.classList.contains('active');

        try {
            if (isCurrentlyFav) {
                // Retirer du Cloud
                await updateDoc(userRef, {
                    favorites: arrayRemove(currentAd)
                });
                btn.classList.remove('active');
                btn.innerHTML = '<i class="fa-regular fa-heart"></i>';
            } else {
                // Ajouter au Cloud
                await updateDoc(userRef, {
                    favorites: arrayUnion(currentAd)
                });
                btn.classList.add('active');
                btn.innerHTML = '<i class="fa-solid fa-heart"></i>';
            }
        } catch (error) {
            console.error("Erreur favoris:", error);
        }
    }

    // 4. Vérifier si l'article est déjà dans le tableau favoris de l'utilisateur
    async function checkIfFav() {
        if (!currentUser) return;
        
        const userRef = doc(db, "users", currentUser.email);
        const userSnap = await getDoc(userRef);
        
        if (userSnap.exists()) {
            const favs = userSnap.data().favorites || [];
            const isFav = favs.some(f => f.id === adId);
            const btn = document.getElementById('fav-btn');
            
            if (isFav) {
                btn.classList.add('active');
                btn.innerHTML = '<i class="fa-solid fa-heart"></i>';
            }
        }
    }

    // 5. Partage
    window.partager = () => {
        if (navigator.share) {
            navigator.share({
                title: currentAd.title,
                text: `Regarde ça sur UniMarket !`,
                url: window.location.href
            });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert("Lien copié !");
        }
    };

    // Rendre la fonction accessible au bouton HTML
    window.toggleFavoris = toggleFavoris;

    document.addEventListener('DOMContentLoaded', chargerArticle);
</script>
