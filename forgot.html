<script type="module">
  // On importe les modules Firebase nécessaires
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
    authDomain: "unimarket-d6259.firebaseapp.com",
    projectId: "unimarket-d6259",
    storageBucket: "unimarket-d6259.firebasestorage.app",
    messagingSenderId: "236655322274",
    appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb",
    measurementId: "G-2TL2FGK6SL"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // On attache la fonction au bouton
  window.handleForgot = async () => {
    const email = document.getElementById('forgotEmail').value.trim();
    const btn = document.getElementById('sendBtn');

    if(!email) return alert("Veuillez saisir votre email.");

    btn.disabled = true;
    btn.innerText = "Vérification...";

    try {
      // 1. Chercher l'utilisateur dans la collection "users" de Firebase
      const q = query(collection(db, "users"), where("email", "==", email));
      const querySnapshot = await getDocs(q);

      if (querySnapshot.empty) {
        alert("Aucun compte UniMarket trouvé pour cet email.");
        btn.disabled = false;
        btn.innerText = "Envoyer le code";
        return;
      }

      const userData = querySnapshot.docs[0].data();
      const recoveryCode = Math.floor(1000 + Math.random() * 9000);

      // 2. Stocker temporairement pour la page suivante
      localStorage.setItem('unimarket_recovery', JSON.stringify({ email: email, code: recoveryCode }));

      // 3. Envoi via EmailJS
      const templateParams = {
        to_name: userData.fullname,
        to_email: email,
        code: recoveryCode,
        from_name: "UniMarket Sécurité"
      };

      emailjs.send('service_unimarket', 'template_0tx9149', templateParams)
        .then(() => {
          alert("Code de récupération envoyé !");
          window.location.href = 'reset-password.html';
        });

    } catch (error) {
      console.error("Erreur Firebase:", error);
      alert("Une erreur est survenue lors de la connexion au serveur.");
      btn.disabled = false;
    }
  };
</script>
