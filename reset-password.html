<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe | UniMarket</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 90%; }
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; outline: none; }
        .btn { background: #2563eb; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Réinitialisation</h2>
        <p style="color: #64748b; margin-bottom: 20px;">Entrez le code reçu par mail et votre nouveau mot de passe.</p>
        
        <input type="text" id="inputCode" placeholder="Code à 4 chiffres">
        <input type="password" id="newPass" placeholder="Nouveau mot de passe">
        <button class="btn" onclick="resetPassword()">Changer le mot de passe</button>
    </div>

    <script>
        function resetPassword() {
            const recoveryData = JSON.parse(localStorage.getItem('unimarket_recovery'));
            const inputCode = document.getElementById('inputCode').value;
            const newPass = document.getElementById('newPass').value;

            if (!recoveryData) { window.location.href = 'forgot.html'; return; }

            if (inputCode == recoveryData.code) {
                if (newPass.length < 4) { alert("Mot de passe trop court !"); return; }

                // Mise à jour de la "base de données"
                let users = JSON.parse(localStorage.getItem('unimarket_users')) || [];
                const userIndex = users.findIndex(u => u.email === recoveryData.email);

                if (userIndex !== -1) {
                    users[userIndex].password = newPass; // On change le mot de passe
                    localStorage.setItem('unimarket_users', JSON.stringify(users));
                    
                    localStorage.removeItem('unimarket_recovery');
                    alert("Mot de passe modifié ! Connectez-vous.");
                    window.location.href = 'login.html';
                }
            } else {
                alert("Code de récupération incorrect !");
            }
        }
    </script>
</body>
</html>
