<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe | UniMarket</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 90%; }
        h2 { margin-top: 0; color: #0f172a; }
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; outline: none; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #2563eb; }
        .btn { background: #2563eb; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn:disabled { background: #64748b; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Réinitialisation</h2>
        <p style="color: #64748b; margin-bottom: 20px;">Entrez le code reçu par mail et votre nouveau mot de passe.</p>
        
        <input type="text" id="inputCode" placeholder="Code à 4 chiffres">
        <input type="password" id="newPass" placeholder="Nouveau mot de passe">
        <button class="btn" id="resetBtn">Changer le mot de passe</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
            authDomain: "unimarket-d6259.firebaseapp.com",
            projectId: "unimarket-d6259",
            storageBucket: "unimarket-d6259.firebasestorage.app",
            messagingSenderId: "236655322274",
            appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb",
            measurementId: "G-2TL2FGK6SL"
        };
        const app = initializeApp(firebaseConfig);
    </script>

    <script>
        const resetBtn = document.getElementById('resetBtn');

        resetBtn.onclick = function resetPassword() {
            const recoveryData = JSON.parse(localStorage.getItem('unimarket_recovery'));
            const inputCode = document.getElementById('inputCode').value.trim();
            const newPass = document.getElementById('newPass').value;

            if (!recoveryData) { 
                window.location.href = 'forgot.html'; 
                return; 
            }

            if (inputCode == recoveryData.code) {
                if (newPass.length < 4) { 
                    alert("Mot de passe trop court (min 4 caractères) !"); 
                    return; 
                }

                // Récupération et mise à jour de l'utilisateur
                let users = JSON.parse(localStorage.getItem('unimarket_users')) || [];
                const userIndex = users.findIndex(u => u.email === recoveryData.email);

                if (userIndex !== -1) {
                    resetBtn.disabled = true;
                    resetBtn.innerText = "Mise à jour...";

                    users[userIndex].password = newPass; 
                    localStorage.setItem('unimarket_users', JSON.stringify(users));
                    
                    localStorage.removeItem('unimarket_recovery');

                    setTimeout(() => {
                        alert("Succès ! Votre mot de passe a été modifié.");
                        window.location.href = 'login.html';
                    }, 1000);
                } else {
                    alert("Erreur : Utilisateur introuvable.");
                    window.location.href = 'register.html';
                }
            } else {
                alert("Code de récupération incorrect !");
            }
        }

        // Vérification de sécurité au chargement
        window.onload = () => {
            if (!localStorage.getItem('unimarket_recovery')) {
                window.location.href = 'forgot.html';
            }
        };
    </script>
</body>
</html>
