<script type="module">
    // 1. Importation des modules Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, arrayRemove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    // 2. Ta configuration Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
        authDomain: "unimarket-d6259.firebaseapp.com",
        projectId: "unimarket-d6259",
        storageBucket: "unimarket-d6259.firebasestorage.app",
        messagingSenderId: "236655322274",
        appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb",
        measurementId: "G-2TL2FGK6SL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 3. Charger les favoris depuis Firebase
    async function loadFavoris() {
        const container = document.getElementById('fav-container');
        
        // On récupère l'utilisateur connecté (stocké lors du login)
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));

        if (!currentUser || !currentUser.email) {
            container.innerHTML = `
                <div class="empty-fav">
                    <i class="fa-solid fa-user-lock"></i>
                    <h2 style="font-weight:800;">Connectez-vous</h2>
                    <p style="color:#64748b; margin-top:10px;">Vous devez être connecté pour voir vos favoris.</p>
                    <a href="login.html" class="btn-shop">Se connecter</a>
                </div>`;
            return;
        }

        try {
            // On récupère le document de l'utilisateur (on suppose que l'ID du doc est l'email ou stocké dans currentUser)
            // Note : Il est préférable d'utiliser l'UID de Firebase Auth, mais ici on reste sur ta logique "email"
            const userRef = doc(db, "users", currentUser.email); 
            const userSnap = await getDoc(userRef);

            const favs = userSnap.exists() ? (userSnap.data().favorites || []) : [];

            if (favs.length === 0) {
                container.innerHTML = `
                    <div class="empty-fav">
                        <i class="fa-regular fa-heart"></i>
                        <h2 style="font-weight:800;">Aucun coup de cœur ?</h2>
                        <p style="color:#64748b; margin-top:10px;">Enregistrez les articles qui vous plaisent.</p>
                        <a href="index.html" class="btn-shop">Découvrir les annonces</a>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            favs.forEach(ad => {
                container.innerHTML += `
                    <div class="fav-card">
                        <img src="${ad.image}" class="fav-img" onclick="window.location.href='article.html?id=${ad.id}'">
                        <div class="fav-info" onclick="window.location.href='article.html?id=${ad.id}'">
                            <h3>${ad.title}</h3>
                            <p>${parseInt(ad.price).toLocaleString()} F</p>
                            <div class="fav-uni">
                                <i class="fa-solid fa-location-dot"></i>
                                ${ad.university || 'Campus'}
                            </div>
                        </div>
                        <button class="btn-remove" data-id="${ad.id}">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
            });

            // Ajouter les événements de suppression
            document.querySelectorAll('.btn-remove').forEach(btn => {
                btn.onclick = () => removeFav(btn.getAttribute('data-id'), favs);
            });

        } catch (error) {
            console.error("Erreur lors du chargement :", error);
        }
    }

    // 4. Supprimer un favori de Firebase
    async function removeFav(id, currentFavs) {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const userRef = doc(db, "users", currentUser.email);
        
        // Trouver l'objet complet à supprimer
        const itemToRemove = currentFavs.find(f => f.id == id);

        if (itemToRemove) {
            try {
                await updateDoc(userRef, {
                    favorites: arrayRemove(itemToRemove)
                });
                loadFavoris(); // Recharger la vue
            } catch (error) {
                alert("Erreur lors de la suppression.");
            }
        }
    }

    document.addEventListener('DOMContentLoaded', loadFavoris);
</script>
