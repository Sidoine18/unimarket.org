<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    // 1. Config Firebase (La même que sur Index)
    const firebaseConfig = {
        apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
        authDomain: "unimarket-d6259.firebaseapp.com",
        projectId: "unimarket-d6259",
        storageBucket: "unimarket-d6259.firebasestorage.app",
        messagingSenderId: "236655322274",
        appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb",
        measurementId: "G-2TL2FGK6SL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const adsContainer = document.getElementById('adsContainer');
    const session = JSON.parse(localStorage.getItem('currentUser'));

    // UI : Salut utilisateur
    if(session) {
        document.getElementById('user-display').innerText = "Salut, " + session.fullname.split(' ')[0];
    }

    // 2. Écouter Firestore en temps réel
    function listenToAds() {
        const adsRef = collection(db, "ads");
        const q = query(adsRef, orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            let annonces = [];
            snapshot.forEach((doc) => {
                annonces.push({ id: doc.id, ...doc.data() });
            });
            
            // Tri : Boostés d'abord
            annonces.sort((a, b) => (a.isBoosted === b.isBoosted ? 0 : a.isBoosted ? -1 : 1));
            
            renderAds(annonces);
        });
    }

    function renderAds(annonces) {
        const favoris = JSON.parse(localStorage.getItem('unimarket_favs')) || [];
        
        if (annonces.length === 0) {
            adsContainer.innerHTML = `
                <div class="empty-state">
                    <i class="fa-solid fa-box-open" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.2;"></i>
                    <p>Aucune annonce pour le moment.</p>
                </div>`;
            return;
        }

        adsContainer.innerHTML = ''; 

        annonces.forEach(ad => {
            const isFav = favoris.some(f => f.id === ad.id);
            const favClass = isFav ? 'active' : '';
            
            // Correction des clés (Firestore utilise .title, .price, .whatsapp)
            const text = encodeURIComponent(`Bonjour ${ad.vendeur}, je suis intéressé par votre annonce "${ad.title}" sur UniMarket.`);
            const waLink = `https://wa.me/${ad.whatsapp}?text=${text}`;

            adsContainer.innerHTML += `
                <article class="ad-card ${ad.isBoosted ? 'boosted-card' : ''}">
                    <div class="ad-img-container">
                        <button class="btn-fav ${favClass}" onclick="window.toggleFav('${ad.id}')">
                            <i class="fa-solid fa-heart"></i>
                        </button>
                        <img src="${ad.image || 'https://via.placeholder.com/300'}" alt="Produit">
                    </div>
                    <div class="ad-info">
                        <p class="ad-price">${Number(ad.price).toLocaleString()} F</p>
                        <h3 class="ad-title">${ad.title}</h3>
                        <p class="ad-seller">
                            <i class="fa-solid fa-university"></i> ${ad.university || 'Campus'}
                        </p>
                        <a href="${waLink}" target="_blank" class="btn-wa">
                            <i class="fa-brands fa-whatsapp"></i> Commander
                        </a>
                    </div>
                </article>
            `;
        });
    }

    // 3. Logique des Favoris (Globale pour les boutons)
    window.toggleFav = function(id) {
        let favoris = JSON.parse(localStorage.getItem('unimarket_favs')) || [];
        const adIndex = favoris.findIndex(f => f.id === id);
        
        if (adIndex > -1) {
            favoris.splice(adIndex, 1);
        } else {
            // Trouver l'annonce dans l'UI ou refaire un scan (simple push de l'ID ici)
            // Pour faire simple et propre, on stocke l'objet minimal
            const card = document.querySelector(`[onclick="window.toggleFav('${id}')"]`).closest('.ad-card');
            const adToAdd = {
                id: id,
                title: card.querySelector('.ad-title').innerText,
                price: card.querySelector('.ad-price').innerText,
                image: card.querySelector('img').src
            };
            favoris.push(adToAdd);
        }
        
        localStorage.setItem('unimarket_favs', JSON.stringify(favoris));
        // On ne recharge pas tout Firestore, on change juste la couleur du bouton
        const btn = document.querySelector(`[onclick="window.toggleFav('${id}')"]`);
        btn.classList.toggle('active');
    };

    // Lancement
    listenToAds();
</script>
