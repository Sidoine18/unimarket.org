<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte | UniMarket</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --white: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

        .auth-card {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; display: block; text-decoration: none; text-align: center; }
        .logo span { color: var(--text); }
        
        h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; color: var(--text); text-align: center; }
        p.subtitle { color: var(--muted); text-align: center; margin-bottom: 30px; font-size: 0.9rem; }

        .form-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .form-group { text-align: left; position: relative; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; color: var(--text); margin-left: 5px; }
        .form-group i { position: absolute; left: 18px; top: 40px; color: var(--muted); transition: 0.3s; }
        
        .form-group input {
            width: 100%;
            padding: 14px 15px 14px 48px;
            border: 2px solid #f1f5f9;
            border-radius: 14px;
            outline: none;
            transition: 0.3s;
            font-size: 0.95rem;
            background: #fbfcfd;
        }

        .form-group input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.05); }
        .form-group input:focus + i { color: var(--primary); }

        .btn-reg {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-reg:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-reg:disabled { background: var(--muted); cursor: not-allowed; }

        .footer-text { margin-top: 25px; font-size: 0.9rem; color: var(--muted); text-align: center; }
        .footer-text a { color: var(--primary); font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>

    <div class="auth-card">
        <a href="index.html" class="logo">Uni<span>Market</span></a>
        <h2>Rejoins la communauté</h2>
        <p class="subtitle">Crée ton compte et commence à vendre au campus.</p>

        <form id="registerForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>Nom complet</label>
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="fullname" placeholder="Ex: Sidoine Bossou" required>
                </div>

                <div class="form-group">
                    <label>Email Universitaire</label>
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="nom@etudiant.uac.bj" required>
                </div>

                <div class="form-group">
                    <label>WhatsApp (Sans indicatif)</label>
                    <i class="fa-brands fa-whatsapp"></i>
                    <input type="tel" id="whatsapp" placeholder="Ex: 97000000" required>
                </div>

                <div class="form-group">
                    <label>Mot de passe</label>
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required minlength="4">
                </div>
            </div>

            <button type="submit" class="btn-reg" id="submitBtn">
                Continuer <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <p class="footer-text">
            Déjà inscrit ? <a href="login.html">Se connecter</a>
        </p>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script>
        // 1. Initialisation
        emailjs.init("v0zJTBHfTAyzyH6RH"); 

        const regForm = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');

        regForm.addEventListener('submit', function(e) {
            e.preventDefault();

            // Récupération des valeurs
            const emailValue = document.getElementById('email').value.trim();
            const fullNameValue = document.getElementById('fullname').value.trim();
            const whatsappValue = document.getElementById('whatsapp').value.trim();
            const passwordValue = document.getElementById('password').value;

            // --- VÉRIFICATION : Si l'utilisateur existe déjà dans la base ---
            const existingUsers = JSON.parse(localStorage.getItem('unimarket_users')) || [];
            const userExists = existingUsers.some(u => u.email === emailValue);

            if (userExists) {
                alert("Cet email est déjà enregistré ! Veuillez vous connecter.");
                window.location.href = 'login.html';
                return;
            }

            // --- ÉTAPE D'ENVOI ---
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Envoi du code...';

            // Génération du code secret
            const codeVerification = Math.floor(1000 + Math.random() * 9000);

            // Préparation des données temporaires
            const tempUser = {
                fullname: fullNameValue,
                email: emailValue,
                whatsapp: whatsappValue,
                password: passwordValue,
                isVerified: false,
                isLoggedIn: false,
                verifCode: codeVerification
            };

            // Paramètres EmailJS (doivent correspondre à tes variables {{}})
            const templateParams = {
                to_name: tempUser.fullname,
                to_email: tempUser.email,
                code: codeVerification,
                from_name: "UniMarket Sécurité"
            };

            // Envoi réel
            emailjs.send('service_unimarket', 'template_0tx9149', templateParams)
                .then(function(response) {
                    console.log('SUCCESS!', response.status, response.text);
                    
                    // Sauvegarde pour la page de vérification
                    localStorage.setItem('unimarket_temp_user', JSON.stringify(tempUser));
                    
                    // Redirection
                    window.location.href = 'verify.html';
                }, function(error) {
                    console.error('FAILED...', error);
                    alert("Oups ! L'envoi du mail a échoué. Vérifie ta connexion.");
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Réessayer l\'inscription <i class="fa-solid fa-arrow-right"></i>';
                });
        });
    </script>
</body>
</html>
