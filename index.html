<script type="module">
    // 1. Initialisation Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
        authDomain: "unimarket-d6259.firebaseapp.com",
        projectId: "unimarket-d6259",
        storageBucket: "unimarket-d6259.firebasestorage.app",
        messagingSenderId: "236655322274",
        appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb",
        measurementId: "G-2TL2FGK6SL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Objet Global UniMarket
    window.UniMarket = {
        session: JSON.parse(localStorage.getItem('currentUser')), // On utilise 'currentUser' pour être raccord avec le Dashboard
        allAds: [],

        init() {
            this.updateUI();
            this.listenToAds();
        },

        // 2. Écoute des annonces en temps réel
        listenToAds() {
            const adsRef = collection(db, "ads");
            // On trie par date de création (décroissant)
            const q = query(adsRef, orderBy("createdAt", "desc"));

            onSnapshot(q, (snapshot) => {
                this.allAds = [];
                snapshot.forEach((doc) => {
                    this.allAds.push({ id: doc.id, ...doc.data() });
                });
                
                // 3. Tri Spécial : Boostés en premier
                const sortedAds = [...this.allAds].sort((a, b) => {
                    if (a.isBoosted === b.isBoosted) return 0;
                    return a.isBoosted ? -1 : 1;
                });

                this.renderAds(sortedAds);
            });
        },

        renderAds(data) {
            const container = document.getElementById('ads-container');
            if(!container) return;
            
            container.innerHTML = data.length > 0 ? '' : '<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: #64748b;">Aucune annonce en ligne...</p>';

            data.forEach(ad => {
                container.innerHTML += `
                    <article class="ad-card ${ad.isBoosted ? 'boosted-card' : ''}" onclick="window.location.href='article.html?id=${ad.id}'">
                        <div class="ad-img">
                            ${ad.isBoosted ? '<span class="badge-boost">🚀 SPONSORISÉ</span>' : ''}
                            <img src="${ad.image || 'https://via.placeholder.com/150'}" alt="${ad.title}">
                        </div>
                        <div class="ad-info">
                            <p class="ad-price">${parseInt(ad.price).toLocaleString()} F</p>
                            <h3 class="ad-title">${ad.title}</h3>
                            <div style="font-size: 0.7rem; color: #64748b; margin-top: 5px;">
                                <i class="fa-solid fa-location-dot"></i> ${ad.university || 'Campus'}
                            </div>
                        </div>
                    </article>
                `;
            });
        },

        filter(category, el) {
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            if (category === 'Toutes') {
                this.renderAds(this.allAds.sort((a,b) => (a.isBoosted === b.isBoosted ? 0 : a.isBoosted ? -1 : 1)));
            } else {
                const filtered = this.allAds.filter(ad => ad.category === category);
                this.renderAds(filtered);
            }
        },

        search() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = this.allAds.filter(ad => 
                ad.title.toLowerCase().includes(term) || 
                ad.university.toLowerCase().includes(term)
            );
            this.renderAds(filtered);
        },

        updateUI() {
            const authZone = document.getElementById('auth-zone');
            const welcomeTitle = document.getElementById('welcome-title');
            
            if (this.session) {
                authZone.innerHTML = `
                    <a href="dashboard.html" style="text-decoration:none;">
                        <div style="width: 40px; height: 40px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 2px solid white; box-shadow: var(--shadow);">
                            ${this.session.profilePic ? 
                                `<img src="${this.session.profilePic}" style="width:100%; height:100%; border-radius:10px; object-fit:cover;">` : 
                                `<span style="color:white; font-weight:800;">${this.session.fullname[0]}</span>`
                            }
                        </div>
                    </a>`;
                
                if (welcomeTitle) {
                    welcomeTitle.innerHTML = `Hello, <span style="color: #fbbf24;">${this.session.fullname.split(' ')[0]}</span> ! 👋`;
                }
            }
        }
    };

    document.addEventListener('DOMContentLoaded', () => UniMarket.init());
</script>
