<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMarket | La Place de Marché Étudiante n°1</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg-light: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --white: #ffffff;
            --radius: 20px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); color: var(--text-main); line-height: 1.5; padding-bottom: 90px; }
        
        /* --- HEADER --- */
        header { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(10px);
            padding: 15px 0; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: -1px; text-decoration: none; }
        .logo span { color: var(--text-main); }
        
        .auth-btns { display: flex; gap: 10px; align-items: center; }
        .btn-fill { background: var(--primary); color: white; padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 0.9rem; text-decoration: none; transition: 0.3s; }
        .btn-fill:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-lite { text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 0.9rem; }

        /* --- HERO & SEARCH --- */
        .hero { 
            background: linear-gradient(135deg, var(--primary) 0%, #1e40af 100%); 
            padding: 60px 0 80px; 
            border-radius: 0 0 40px 40px; 
            color: white; 
            text-align: center;
        }
        .hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 25px; line-height: 1.2; padding: 0 10px; }
        
        .search-container { position: relative; max-width: 500px; margin: 0 auto; padding: 0 20px; }
        .search-container input { 
            width: 100%; 
            padding: 18px 25px 18px 55px; 
            border-radius: 20px; 
            border: none; 
            font-size: 1rem; 
            font-weight: 600; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        .search-container i { position: absolute; left: 40px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.2rem; }

        /* --- TRUST BAR --- */
        .trust-bar { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-top: -35px; 
            padding: 0 20px;
        }
        .trust-item { 
            background: white; 
            padding: 15px 20px; 
            border-radius: 18px; 
            box-shadow: var(--shadow); 
            display: flex; 
            align-items: center; 
            gap: 10px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .trust-item i { color: #10b981; }

        /* --- FILTRES --- */
        .cat-section { padding: 30px 0 10px; }
        .cat-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; }
        .cat-scroll::-webkit-scrollbar { display: none; }
        
        .cat-item { 
            background: var(--white); 
            padding: 12px 22px; 
            border-radius: 50px; 
            white-space: nowrap; 
            font-weight: 700; 
            font-size: 0.85rem; 
            box-shadow: var(--shadow); 
            border: 1px solid #f1f5f9; 
            cursor: pointer;
            transition: 0.3s;
        }
        .cat-item.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- GRILLE --- */
        .ads-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        @media (min-width: 768px) { .ads-grid { grid-template-columns: repeat(4, 1fr); } }

        .ad-card { 
            background: var(--white); 
            border-radius: var(--radius); 
            overflow: hidden; 
            box-shadow: var(--shadow); 
            border: 1px solid #f1f5f9;
            transition: 0.3s;
            position: relative;
            cursor: pointer;
        }
        .ad-card:hover { transform: translateY(-5px); }
        .ad-img { width: 100%; height: 160px; background: #f1f5f9; position: relative; }
        .ad-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .badge-boost { 
            position: absolute; top: 10px; left: 10px; 
            background: var(--primary); color: white; 
            font-size: 0.6rem; font-weight: 800; 
            padding: 4px 8px; border-radius: 6px; 
        }

        .ad-info { padding: 15px; }
        .ad-price { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        .ad-title { font-size: 0.85rem; font-weight: 600; color: var(--text-main); height: 38px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* --- TAB BAR --- */
        .tab-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: var(--white); display: flex; 
            justify-content: space-around; padding: 12px 0; 
            border-top: 1px solid #f1f5f9; z-index: 1000; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.03);
        }
        .tab-item { text-align: center; color: var(--text-muted); font-size: 0.7rem; font-weight: 700; text-decoration: none; }
        .tab-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
        .tab-item.active { color: var(--primary); }
        
        .tab-plus { 
            background: var(--primary); color: white !important; 
            width: 55px; height: 55px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            margin-top: -35px; border: 5px solid var(--bg-light);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .boosted-card { border: 2px solid var(--primary) !important; background: #f0f7ff !important; animation: pulse-border 3s infinite; }
        @keyframes pulse-border { 0% { border-color: var(--primary); } 50% { border-color: #fbbf24; } 100% { border-color: var(--primary); } }
    </style>
</head>
<body>

    <header>
        <div class="container nav-flex">
            <a href="index.html" class="logo">Uni<span>Market</span></a>
            <div id="auth-zone" class="auth-btns">
                <a href="login.html" class="btn-lite">Connexion</a>
                <a href="register.html" class="btn-fill">S'inscrire</a>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1 id="welcome-title">Achète et vends en toute sécurité sur ton campus.</h1>
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" onkeyup="UniMarket.search()" placeholder="Que cherchez-vous aujourd'hui ?">
            </div>
        </div>
    </section>

    <div class="trust-bar">
        <div class="trust-item"><i class="fa-solid fa-circle-check"></i> Étudiants vérifiés</div>
        <div class="trust-item"><i class="fa-solid fa-shield-halved"></i> Main à main</div>
    </div>

    <main class="container">
        <section class="cat-section">
            <div class="cat-scroll" id="cat-list">
                <div class="cat-item active" onclick="UniMarket.filter('Toutes', this)">Toutes</div>
                <div class="cat-item" onclick="UniMarket.filter('Restauration', this)">🍔 Restauration</div>
                <div class="cat-item" onclick="UniMarket.filter('Mode', this)">👕 Mode</div>
                <div class="cat-item" onclick="UniMarket.filter('High-Tech', this)">💻 High-Tech</div>
                <div class="cat-item" onclick="UniMarket.filter('Scolaire', this)">📚 Scolaire</div>
                <div class="cat-item" onclick="UniMarket.filter('Services', this)">⚡ Services</div>
            </div>
        </section>

        <div class="ads-grid" id="ads-container"></div>
    </main>

    <nav class="tab-bar">
        <a href="index.html" class="tab-item active"><i class="fa-solid fa-house"></i>Accueil</a>
        <a href="annonces.html" class="tab-item"><i class="fa-solid fa-magnifying-glass"></i>Explorer</a>
        <a href="publier.html" class="tab-item tab-plus"><i class="fa-solid fa-plus"></i></a>
        <a href="favoris.html" class="tab-item"><i class="fa-solid fa-heart"></i>Favoris</a>
        <a href="dashboard.html" class="tab-item"><i class="fa-solid fa-circle-user"></i>Compte</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
            authDomain: "unimarket-d6259.firebaseapp.com",
            projectId: "unimarket-d6259",
            storageBucket: "unimarket-d6259.firebasestorage.app",
            messagingSenderId: "236655322274",
            appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb",
            measurementId: "G-2TL2FGK6SL"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
    </script>

    <script>
    const UniMarket = {
        session: JSON.parse(localStorage.getItem('unimarket_session')),

        getAdsSorted() {
            const rawAds = JSON.parse(localStorage.getItem('unimarket_ads')) || [];
            return rawAds.sort((a, b) => {
                if (a.isBoosted === b.isBoosted) return b.id - a.id;
                return a.isBoosted ? -1 : 1;
            });
        },

        init() {
            this.ads = this.getAdsSorted();
            this.updateUI();
            this.renderAds(this.ads);
            this.checkSecurity();
        },

        renderAds(data) {
            const container = document.getElementById('ads-container');
            if(!container) return;
            container.innerHTML = data.length > 0 ? '' : '<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: #64748b;">Aucune annonce trouvée...</p>';

            data.forEach(ad => {
                container.innerHTML += `
                    <article class="ad-card ${ad.isBoosted ? 'boosted-card' : ''}" onclick="window.location.href='article.html?id=${ad.id}'">
                        <div class="ad-img">
                            ${ad.isBoosted ? '<span class="badge-boost">🚀 SPONSORISÉ</span>' : ''}
                            <img src="${ad.image}" alt="${ad.title}">
                        </div>
                        <div class="ad-info">
                            <p class="ad-price">${parseInt(ad.price).toLocaleString()} F</p>
                            <h3 class="ad-title">${ad.title}</h3>
                            ${ad.isBoosted ? '<div style="font-size: 0.65rem; color: var(--primary); font-weight: 800; margin-top: 5px;">Vendeur Premium</div>' : ''}
                        </div>
                    </article>
                `;
            });
        },

        filter(category, el) {
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            const allSorted = this.getAdsSorted();
            const filtered = category === 'Toutes' ? allSorted : allSorted.filter(ad => ad.category === category);
            this.renderAds(filtered);
        },

        search() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const allSorted = this.getAdsSorted();
            const filtered = allSorted.filter(ad => 
                ad.title.toLowerCase().includes(query) || (ad.category && ad.category.toLowerCase().includes(query))
            );
            this.renderAds(filtered);
        },

        checkSecurity() {
            const tempUser = localStorage.getItem('unimarket_temp_user');
            if (tempUser && (!this.session || !this.session.isVerified)) {
                window.location.href = 'verify.html';
            }
        },

        updateUI() {
            const authZone = document.getElementById('auth-zone');
            const welcomeTitle = document.getElementById('welcome-title');
            if (this.session && this.session.isLoggedIn) {
                authZone.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <a href="dashboard.html" style="display: flex; align-items: center; gap: 8px;">
                            <div style="width: 35px; height: 35px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                                ${this.session.fullname.charAt(0).toUpperCase()}
                            </div>
                        </a>
                        <i class="fa-solid fa-power-off" onclick="UniMarket.logout()" style="color: #ef4444; cursor: pointer; font-size: 1.1rem;"></i>
                    </div>`;
                if (welcomeTitle) {
                    welcomeTitle.innerHTML = `Ravi de vous revoir, <span style="color: #fbbf24;">${this.session.fullname.split(' ')[0]}</span> ! 👋`;
                }
            }
        },

        logout() {
            if (confirm("Se déconnecter ?")) {
                localStorage.removeItem('unimarket_session');
                window.location.reload();
            }
        }
    };

    document.addEventListener('DOMContentLoaded', () => UniMarket.init());
    </script>
</body>
</html>
